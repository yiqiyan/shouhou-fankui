# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 数据库连接配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://47.85.49.162:3306/HH_shouhou_fankui?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: yqy300933
    # 修正：HikariCP 配置必须放在 spring.datasource 下
    hikari:
      max-lifetime: 1800000        # 连接最大生命周期（30分钟）
      idle-timeout: 600000         # 连接闲置超时（10分钟）
      connection-test-query: SELECT 1  # 验证连接的SQL
      validation-timeout: 5000     # 连接验证超时时间（新增，优化连接检测）
      keepalive-time: 300000       # HikariCP 闲置连接保活（替代test-while-idle）

  # 时区与 JSON 日期格式
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 5MB        # 单文件最大5MB
      max-request-size: 10MB    # 单次请求最大10MB
  web:
    resources:
      # 映射本地目录到静态资源，让图片可通过URL访问
#      static-locations: file:/home/admin/upload/feedback-images/
      static-locations: file:D:\\data\\upload\\feedback-images\\

# 自定义上传路径
#upload:
#  local-path: /home/admin/upload/feedback-images/
#  base-url: http://47.85.49.162:8080/  # ECS公网IP
upload:
  local-path: D:\\data\\upload\\feedback-images\\
  base-url: http://localhost:8080/

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: cn.huahai.entity
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 修正：全局主键策略改为 INPUT（适配String类型主键）
      # 若部分表用自增Long主键，可在实体类单独配置 @TableId(type = IdType.AUTO)
      id-type: input
#      logic-delete-field: status
      logic-delete-value: disable
      logic-not-delete-value: enable

# 日志配置
logging:
  level:
    cn.huahai.mapper: debug
    org.springframework.web: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

